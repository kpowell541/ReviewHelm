<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="compassNorth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b93ff"/>
      <stop offset="100%" style="stop-color:#6c63ff"/>
    </linearGradient>
    <linearGradient id="compassSouth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a5a"/>
      <stop offset="100%" style="stop-color:#2a2a4a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad3)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Outer compass ring -->
  <circle cx="256" cy="236" r="160" fill="none" stroke="#3a3a5a" stroke-width="3"/>
  <circle cx="256" cy="236" r="150" fill="none" stroke="#4a4a6a" stroke-width="1.5"/>

  <!-- Tick marks around compass -->
  <!-- N -->
  <line x1="256" y1="76" x2="256" y2="92" stroke="#6c63ff" stroke-width="3"/>
  <text x="256" y="72" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#6c63ff" text-anchor="middle">N</text>
  <!-- E -->
  <line x1="416" y1="236" x2="400" y2="236" stroke="#4a4a6a" stroke-width="3"/>
  <!-- S -->
  <line x1="256" y1="396" x2="256" y2="380" stroke="#4a4a6a" stroke-width="3"/>
  <!-- W -->
  <line x1="96" y1="236" x2="112" y2="236" stroke="#4a4a6a" stroke-width="3"/>

  <!-- Compass rose - North pointer (purple, pointing up) -->
  <polygon points="256,100 240,236 272,236" fill="url(#compassNorth)" opacity="0.9"/>
  <!-- South pointer (dark) -->
  <polygon points="256,372 240,236 272,236" fill="url(#compassSouth)" opacity="0.7"/>
  <!-- East pointer -->
  <polygon points="392,236 256,220 256,252" fill="url(#compassSouth)" opacity="0.5"/>
  <!-- West pointer -->
  <polygon points="120,236 256,220 256,252" fill="url(#compassSouth)" opacity="0.5"/>

  <!-- Center circle -->
  <circle cx="256" cy="236" r="28" fill="#1a1a2e" stroke="#6c63ff" stroke-width="4"/>

  <!-- Code cursor in center -->
  <rect x="249" y="222" width="3" height="28" fill="#6c63ff" rx="1">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="261" y="244" font-family="SF Mono, Menlo, monospace" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">/</text>

  <!-- Inner decorative ring -->
  <circle cx="256" cy="236" r="48" fill="none" stroke="#3a3a5a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- App name -->
  <text x="256" y="450" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">ReviewHelm</text>
</svg>