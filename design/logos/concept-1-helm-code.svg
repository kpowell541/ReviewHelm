<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="purpleGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c73ff"/>
      <stop offset="100%" style="stop-color:#6c63ff"/>
    </linearGradient>
    <linearGradient id="glowGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b93ff"/>
      <stop offset="100%" style="stop-color:#6c63ff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad1)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Ship's wheel - outer ring -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="url(#purpleGrad1)" stroke-width="16" stroke-linecap="round"/>

  <!-- Inner ring -->
  <circle cx="256" cy="240" r="50" fill="none" stroke="url(#purpleGrad1)" stroke-width="12"/>

  <!-- Wheel spokes - 8 spokes -->
  <!-- Top -->
  <line x1="256" y1="100" x2="256" y2="190" stroke="url(#purpleGrad1)" stroke-width="12" stroke-linecap="round"/>
  <!-- Bottom -->
  <line x1="256" y1="290" x2="256" y2="380" stroke="url(#purpleGrad1)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left -->
  <line x1="116" y1="240" x2="206" y2="240" stroke="url(#purpleGrad1)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right -->
  <line x1="306" y1="240" x2="396" y2="240" stroke="url(#purpleGrad1)" stroke-width="12" stroke-linecap="round"/>

  <!-- Diagonal spokes -->
  <line x1="157" y1="141" x2="221" y2="205" stroke="url(#purpleGrad1)" stroke-width="12" stroke-linecap="round"/>
  <line x1="355" y1="141" x2="291" y2="205" stroke="url(#purpleGrad1)" stroke-width="12" stroke-linecap="round"/>
  <line x1="157" y1="339" x2="221" y2="275" stroke="url(#purpleGrad1)" stroke-width="12" stroke-linecap="round"/>
  <line x1="355" y1="339" x2="291" y2="275" stroke="url(#purpleGrad1)" stroke-width="12" stroke-linecap="round"/>

  <!-- Handle knobs on cardinal spokes -->
  <circle cx="256" cy="92" r="12" fill="url(#glowGrad1)"/>
  <circle cx="256" cy="388" r="12" fill="url(#glowGrad1)"/>
  <circle cx="108" cy="240" r="12" fill="url(#glowGrad1)"/>
  <circle cx="404" cy="240" r="12" fill="url(#glowGrad1)"/>

  <!-- Code brackets in center: < > -->
  <text x="234" y="250" font-family="SF Mono, Menlo, Consolas, monospace" font-size="40" font-weight="700" fill="#ffffff" text-anchor="middle">&lt;</text>
  <text x="278" y="250" font-family="SF Mono, Menlo, Consolas, monospace" font-size="40" font-weight="700" fill="#ffffff" text-anchor="middle">&gt;</text>

  <!-- App name below -->
  <text x="256" y="450" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">ReviewHelm</text>
</svg>