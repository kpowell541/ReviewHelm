<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="shield6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c73ff"/>
      <stop offset="100%" style="stop-color:#5a52dd"/>
    </linearGradient>
    <linearGradient id="north6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b93ff"/>
      <stop offset="100%" style="stop-color:#6c63ff"/>
    </linearGradient>
    <linearGradient id="south6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a5a"/>
      <stop offset="100%" style="stop-color:#2a2a4a"/>
    </linearGradient>
    <linearGradient id="green6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg6)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Shield shape - outer glow -->
  <path d="M256 55 L410 118 L410 265 Q410 370 256 440 Q102 370 102 265 L102 118 Z"
        fill="url(#shield6)" opacity="0.08"/>
  <path d="M256 55 L410 118 L410 265 Q410 370 256 440 Q102 370 102 265 L102 118 Z"
        fill="none" stroke="url(#shield6)" stroke-width="4" stroke-linejoin="round" opacity="0.6"/>

  <!-- Compass outer ring inside shield -->
  <circle cx="256" cy="230" r="120" fill="none" stroke="#3a3a5a" stroke-width="2"/>
  <circle cx="256" cy="230" r="112" fill="none" stroke="#4a4a6a" stroke-width="1"/>

  <!-- Compass tick marks -->
  <line x1="256" y1="110" x2="256" y2="124" stroke="#6c63ff" stroke-width="3"/>
  <line x1="376" y1="230" x2="362" y2="230" stroke="#4a4a6a" stroke-width="2"/>
  <line x1="256" y1="350" x2="256" y2="336" stroke="#4a4a6a" stroke-width="2"/>
  <line x1="136" y1="230" x2="150" y2="230" stroke="#4a4a6a" stroke-width="2"/>

  <!-- Minor ticks -->
  <line x1="341" y1="145" x2="334" y2="152" stroke="#3a3a5a" stroke-width="1.5"/>
  <line x1="341" y1="315" x2="334" y2="308" stroke="#3a3a5a" stroke-width="1.5"/>
  <line x1="171" y1="145" x2="178" y2="152" stroke="#3a3a5a" stroke-width="1.5"/>
  <line x1="171" y1="315" x2="178" y2="308" stroke="#3a3a5a" stroke-width="1.5"/>

  <!-- Compass rose - North pointer (purple) -->
  <polygon points="256,130 244,230 268,230" fill="url(#north6)" opacity="0.85"/>
  <!-- South pointer (dark) -->
  <polygon points="256,330 244,230 268,230" fill="url(#south6)" opacity="0.6"/>
  <!-- East pointer (short) -->
  <polygon points="350,230 256,220 256,240" fill="url(#south6)" opacity="0.4"/>
  <!-- West pointer (short) -->
  <polygon points="162,230 256,220 256,240" fill="url(#south6)" opacity="0.4"/>

  <!-- Center hub -->
  <circle cx="256" cy="230" r="32" fill="#12121f" stroke="#6c63ff" stroke-width="3"/>

  <!-- Code brackets in center hub -->
  <text x="242" y="237" font-family="SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">&lt;</text>
  <text x="270" y="237" font-family="SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">&gt;</text>

  <!-- Green checkmark at shield base -->
  <path d="M237 390 L253 406 L279 376" fill="none" stroke="url(#green6)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- N marker -->
  <text x="256" y="104" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#6c63ff" text-anchor="middle">N</text>

  <!-- App name -->
  <text x="256" y="475" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">ReviewHelm</text>
</svg>