<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="shield8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b83ff"/>
      <stop offset="100%" style="stop-color:#5a52dd"/>
    </linearGradient>
    <linearGradient id="north8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c0bbff"/>
    </linearGradient>
    <linearGradient id="green8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg8)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Shield - bold filled -->
  <path d="M256 58 L405 118 L405 262 Q405 365 256 432 Q107 365 107 262 L107 118 Z"
        fill="url(#shield8)" opacity="0.18"/>
  <path d="M256 58 L405 118 L405 262 Q405 365 256 432 Q107 365 107 262 L107 118 Z"
        fill="none" stroke="url(#shield8)" stroke-width="6" stroke-linejoin="round"/>

  <!-- Compass outer ring -->
  <circle cx="256" cy="228" r="118" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.15"/>

  <!-- Bold compass rose -->
  <!-- North - white/purple gradient, prominent -->
  <polygon points="256,110 240,215 272,215" fill="url(#north8)" opacity="0.9"/>
  <!-- South -->
  <polygon points="256,346 240,241 272,241" fill="#3a3a5a" opacity="0.6"/>
  <!-- East -->
  <polygon points="374,228 269,214 269,242" fill="#3a3a5a" opacity="0.45"/>
  <!-- West -->
  <polygon points="138,228 243,214 243,242" fill="#3a3a5a" opacity="0.45"/>

  <!-- Center circle - code hub -->
  <circle cx="256" cy="228" r="42" fill="#0f0f1a"/>
  <circle cx="256" cy="228" r="42" fill="none" stroke="#6c63ff" stroke-width="4"/>

  <!-- Code brackets, larger and bolder -->
  <text x="238" y="238" font-family="SF Mono, Menlo, Consolas, monospace" font-size="30" font-weight="800" fill="#4ade80" text-anchor="middle">&lt;</text>
  <text x="258" y="238" font-family="SF Mono, Menlo, Consolas, monospace" font-size="30" font-weight="800" fill="#ffffff" text-anchor="middle">/</text>
  <text x="276" y="238" font-family="SF Mono, Menlo, Consolas, monospace" font-size="30" font-weight="800" fill="#4ade80" text-anchor="middle">&gt;</text>

  <!-- Tick marks - cardinal -->
  <line x1="256" y1="96" x2="256" y2="108" stroke="#9b93ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="348" x2="256" y2="360" stroke="#4a4a6a" stroke-width="2" stroke-linecap="round"/>
  <line x1="124" y1="228" x2="136" y2="228" stroke="#4a4a6a" stroke-width="2" stroke-linecap="round"/>
  <line x1="376" y1="228" x2="388" y2="228" stroke="#4a4a6a" stroke-width="2" stroke-linecap="round"/>

  <!-- N badge -->
  <text x="256" y="90" font-family="-apple-system, sans-serif" font-size="16" font-weight="800" fill="#9b93ff" text-anchor="middle">N</text>

  <!-- Green checkmark badge at bottom of shield -->
  <circle cx="256" cy="395" r="20" fill="#0f0f1a"/>
  <circle cx="256" cy="395" r="20" fill="url(#green8)" opacity="0.15"/>
  <circle cx="256" cy="395" r="20" fill="none" stroke="url(#green8)" stroke-width="3"/>
  <path d="M246 395 L253 402 L267 388" fill="none" stroke="url(#green8)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- App name - split color -->
  <text x="195" y="472" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">Review</text>
  <text x="333" y="472" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="34" font-weight="700" fill="#6c63ff" text-anchor="middle">Helm</text>
</svg>