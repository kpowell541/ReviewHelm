<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c73ff"/>
      <stop offset="70%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#5a52dd"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad2)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Shield shape -->
  <path d="M256 60 L400 120 L400 260 Q400 360 256 430 Q112 360 112 260 L112 120 Z"
        fill="url(#shieldGrad)" opacity="0.15"/>
  <path d="M256 60 L400 120 L400 260 Q400 360 256 430 Q112 360 112 260 L112 120 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="6" stroke-linejoin="round"/>

  <!-- Mini helm wheel inside shield -->
  <circle cx="256" cy="230" r="90" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.9"/>
  <circle cx="256" cy="230" r="32" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.9"/>

  <!-- Spokes -->
  <line x1="256" y1="140" x2="256" y2="198" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="256" y1="262" x2="256" y2="320" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="166" y1="230" x2="224" y2="230" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="288" y1="230" x2="346" y2="230" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- Diagonal spokes -->
  <line x1="192" y1="166" x2="234" y2="208" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="320" y1="166" x2="278" y2="208" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="192" y1="294" x2="234" y2="252" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="320" y1="294" x2="278" y2="252" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- Handle knobs -->
  <circle cx="256" cy="134" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="256" cy="326" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="160" cy="230" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="352" cy="230" r="8" fill="#ffffff" opacity="0.9"/>

  <!-- Checkmark accent at bottom of shield -->
  <path d="M236 370 L252 386 L280 354" fill="none" stroke="#6c63ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- App name -->
  <text x="256" y="470" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">ReviewHelm</text>
</svg>