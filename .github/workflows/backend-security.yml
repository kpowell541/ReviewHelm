name: Security

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'src/**'
      - 'app/**'
      - 'package.json'
      - 'package-lock.json'
      - 'assets/data/checklists/**'
      - 'scripts/sync-backend-checklists.mjs'
      - 'scripts/check-backend-checklists-sync.mjs'
      - 'docs/openapi.yaml'
      - '.github/workflows/backend-security.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'src/**'
      - 'app/**'
      - 'package.json'
      - 'package-lock.json'
      - 'assets/data/checklists/**'
      - 'scripts/sync-backend-checklists.mjs'
      - 'scripts/check-backend-checklists-sync.mjs'
      - 'docs/openapi.yaml'
      - '.github/workflows/backend-security.yml'

jobs:
  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reviewhelm
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/reviewhelm
        run: npx prisma validate

      - name: Verify checklist bundle sync
        run: npm run checklists:verify-sync

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: OpenAPI route drift check
        run: npm run openapi:check-routes

      - name: OpenAPI schema validation
        run: npm run openapi:validate

      - name: OpenAPI security policy check
        run: npm run openapi:check-security

      - name: Dependency audit (prod)
        run: npm audit --omit=dev --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: OpenAPI type drift check
        run: npx openapi-typescript docs/openapi.yaml -o /tmp/generated.ts && diff src/api/generated.ts /tmp/generated.ts

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Dependency audit (prod)
        run: npm audit --omit=dev --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp
          /tmp/gitleaks version

      - name: Gitleaks (workspace scan)
        run: |
          set -euo pipefail
          /tmp/gitleaks dir . --config .gitleaks.toml --redact --exit-code 1
